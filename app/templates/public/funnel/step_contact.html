<div id="funnel-container" class="card bg-base-100 shadow-xl max-w-lg mx-auto mt-16 p-8">
  <div class="text-4xl mb-4">🎉</div>
  <h2 class="text-2xl font-bold mb-2">Almost done!</h2>
  <p class="text-base-content/70 mb-6">Where should we send your personalized results?</p>

  {% if error %}
  <div class="alert alert-error mb-4">
    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form hx-post="/funnel/submit" hx-target="#funnel-container" hx-swap="outerHTML">
    <div class="form-control mb-4">
      <label class="label">
        <span class="label-text font-medium">Email address <span class="text-error">*</span></span>
      </label>
      <input type="email" name="email" class="input input-bordered" placeholder="you@example.com" required autofocus>
    </div>
    <div class="form-control mb-6">
      <label class="label">
        <span class="label-text font-medium">Phone number <span class="text-base-content/50 font-normal">(optional)</span></span>
      </label>
      <input type="tel" name="phone" class="input input-bordered" placeholder="+43 ...">
    </div>
    <button type="submit" class="btn btn-primary w-full">Send me my results →</button>
    <p class="text-xs text-center mt-3 text-base-content/40">🔒 We respect your privacy. No spam, ever.</p>
  </form>
</div>
